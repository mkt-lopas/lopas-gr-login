<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lopas — Dashboard de Inteligência Comercial</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,sans-serif;
  background:linear-gradient(135deg,#1a2f1a 0%,#2f572a 55%,#4a7c59 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;top:-50%;right:-30%;width:100%;height:200%;
  background:radial-gradient(ellipse,rgba(116,170,45,0.15) 0%,transparent 60%);
  pointer-events:none;}
body::after{content:'';position:absolute;bottom:-50%;left:-30%;width:100%;height:200%;
  background:radial-gradient(ellipse,rgba(74,124,89,0.18) 0%,transparent 60%);
  pointer-events:none;}
.box{background:#fff;border-radius:20px;padding:44px 44px 36px;width:420px;
  box-shadow:0 30px 80px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,0.1);
  text-align:center;position:relative;z-index:1;}
.logo-wrap{width:110px;height:110px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border-radius:20px;padding:8px;}
.logo-wrap img{width:100%;height:100%;object-fit:contain;}
.divider{width:48px;height:3px;background:linear-gradient(90deg,#2f572a,#74aa2d);
  margin:0 auto 16px;border-radius:2px;}
.title{font-size:15px;font-weight:700;color:#2f572a;
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.sub{font-size:11px;color:#888;letter-spacing:2px;font-weight:500;
  text-transform:uppercase;margin-bottom:32px;}
.field{margin-bottom:14px;text-align:left;}
label{display:block;font-size:10px;font-weight:700;color:#4a7c59;
  margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
input{width:100%;padding:13px 15px;border:1.5px solid #e0e0e0;
  border-radius:10px;font-size:14px;outline:none;transition:all .2s;
  font-family:inherit;background:#fafafa;}
input:focus{border-color:#2f572a;background:#fff;
  box-shadow:0 0 0 3px rgba(47,87,42,.12);}
.btn{width:100%;margin-top:14px;padding:14px;
  background:linear-gradient(135deg,#2f572a 0%,#4a8c3f 100%);
  color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
  text-transform:uppercase;box-shadow:0 4px 14px rgba(47,87,42,.3);}
.btn:hover{transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(47,87,42,.4);
  background:linear-gradient(135deg,#4a8c3f 0%,#5fa052 100%);}
.btn:active{transform:translateY(0);}
.err{margin-top:14px;color:#c0392b;font-size:12px;font-weight:600;
  display:none;background:#fce7e4;padding:8px;border-radius:6px;}
.ok{margin-top:14px;color:#2f6b3a;font-size:12px;font-weight:600;
  display:none;background:#e7f5e3;padding:8px;border-radius:6px;}
.foot{margin-top:26px;padding-top:20px;border-top:1px solid #eee;
  font-size:10px;color:#aaa;letter-spacing:.5px;}
.foot strong{color:#2f572a;}
</style>
</head>

  <button class="btn" onclick="lauth()">Acessar</button>
  <div class="err" id="lerr">E-mail ou senha incorretos. Tente novamente.</div>
  <div class="ok" id="lok">Autenticado! Redirecionando...</div>
  <div class="foot"><strong>Móveis Lopas</strong> &copy; 2026 &mdash; Acesso restrito</div>
</div>
<script>
var USERS = {
  "af74ced1": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-geral", nome:"Geral Lopas"},
  "a355ba83": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-baltazar", nome:"Baltazar"},
  "9bf9933b": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-marcos", nome:"Marcos"},
  "7fac7fb3": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-flavio", nome:"Flávio"},
  "6069457c": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-emmanuel", nome:"Emmanuel"},
  "250eeea4": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-bianca", nome:"Bianca"},
  "b6994190": {pwd:"144e46bf", url:"https://mkt-lopas.github.io/lopas-gr-sabrina", nome:"Sabrina — Diretoria Comercial"},
};
function sh(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return(h>>>0).toString(16);}
function lauth(){
  var e=document.getElementById('lemail').value.trim().toLowerCase();
  var p=document.getElementById('lpwd').value;
  if(!e||!p){document.getElementById('lerr').style.display='block';return;}
  var he=sh(e), hp=sh(p);
  var u=USERS[he];
  if(u && u.pwd===hp){
    document.getElementById('lerr').style.display='none';
    document.getElementById('lok').style.display='block';
    document.getElementById('lok').textContent='Olá, '+u.nome+'! Redirecionando...';
    setTimeout(function(){window.location.href=u.url;},1200);
  } else {
    document.getElementById('lerr').style.display='block';
    document.getElementById('lpwd').value='';
    document.getElementById('lpwd').focus();
  }
}
document.getElementById('lpwd').addEventListener('keydown',function(e){if(e.key==='Enter')lauth();});
document.getElementById('lemail').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('lpwd').focus();});
</script>
</body>
</html>
